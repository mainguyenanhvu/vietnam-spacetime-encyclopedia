name: Build & Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Kiểm toán chủ quyền biển đảo (bắt buộc)
        run: node scripts/audit_sovereignty.mjs
      - name: Validate hồ sơ tỉnh (schema + sources bắt buộc)
        run: node scripts/validate_provinces.mjs
      - name: Validate thư viện văn học (nguồn chính thống, bản quyền)
        run: node scripts/validate_literature.mjs
      - name: Validate manifest ảnh (cổng license media)
        run: node scripts/validate_media.mjs
      - name: Validate nhân vật lịch sử (nhãn hình dung + nguồn chính sử)
        run: node scripts/validate_figures.mjs
      - name: Validate sa đồ chiến dịch (disclaimer + nguồn chính sử)
        run: node scripts/validate_battles.mjs
      - name: Validate hành trình lịch sử (liên kết nhân vật/trận + nguồn)
        run: node scripts/validate_journey.mjs
      - name: Validate phim tài liệu + nhạc yêu nước (youtube_id + kênh + slug)
        run: node scripts/validate_documentaries.mjs
      - name: Validate lớp phủ + Nam tiến (bbox + nguồn + phủ 34 tỉnh)
        run: node scripts/validate_overlays.mjs
      - run: npm run build
        env:
          BASE_PATH: /vietnam-spacetime-encyclopedia/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
